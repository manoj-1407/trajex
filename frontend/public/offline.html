<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trajex — Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* dark theme, accent #00e5cc, clean centered layout */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07070f; color: #e8e8f0; font-family: Outfit, system-ui; 
           min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .logo-svg { width: 48px; height: 48px; margin-bottom: 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    p { color: #9090a8; font-size: 15px; margin-bottom: 32px; text-align: center; max-width: 320px; }
    button { background: #00e5cc; color: #07070f; border: none; padding: 12px 28px; 
             border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    button:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <svg class="logo-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 2 L16 30 M16 30 C16 30 28 26 28 16" stroke="#00e5cc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Your data will sync when you're back online.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
