name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trajex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        
    - name: Frontend Build
      run: |
        cd frontend
        npm install
        npm run build
        
    - name: Backend Test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trajex_test
        JWT_ACCESS_SECRET: test_secret
        JWT_REFRESH_SECRET: test_refresh_secret
        CORS_ORIGIN: http://localhost:5173
        NODE_ENV: test
      run: |
        cd backend
        npm install
        # Wait for Postgres to be fully ready
        until pg_isready -h localhost -p 5432; do
          echo "Waiting for postgres..."
          sleep 2
        done
        npm test

    - name: Backend Lint
      run: |
        cd backend
        npm run lint
