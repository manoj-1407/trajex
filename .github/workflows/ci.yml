name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB: trajex_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: backend

      - name: Migrate & Apply RLS
        env:
          PGPASSWORD: ci_secret
          DATABASE_URL: postgresql://postgres:ci_secret@127.0.0.1:5432/trajex_test
        run: |
          npm run migrate:up
          psql -U postgres -h 127.0.0.1 -d trajex_test -f rls.sql
        working-directory: backend

      - name: Test
        run: npm test -- --forceExit --ci
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:ci_secret@127.0.0.1:5432/trajex_test
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci-access-secret-at-least-32-chars-long
          JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-chars!!
          CORS_ORIGIN: http://localhost:5173
          PORT: "4000"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - name: Syntax check
        run: node --check src/app.js src/server.js src/config/db.js
        working-directory: backend
